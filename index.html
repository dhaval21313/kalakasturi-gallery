<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#050505" />
  <title>KalaKasturi — Original Indian Fine Art | Ankita, Rishikesh</title>
  <meta name="description" content="Original hand-painted Indian classical and spiritual artworks by artist Ankita from Rishikesh. Raja Ravi Varma tradition. Buy direct — certified, worldwide shipping." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fahkwang:wght@400;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Scroll Progress -->
  <div class="scroll-progress" id="scrollProgress"></div>

  <!-- Toast -->
  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <!-- Cart Overlay -->
  <div class="cart-overlay" id="cartOverlay"></div>

  <!-- Cart Drawer -->
  <aside class="cart-drawer" id="cartDrawer" aria-label="Shopping cart" role="dialog">
    <div class="cart-drawer-head">
      <span class="cart-drawer-title">YOUR COLLECTION</span>
      <button class="cart-close-btn" onclick="closeCart()" aria-label="Close cart">×</button>
    </div>
    <div class="cart-drawer-body" id="cartBody">
      <div class="cart-empty-state" id="cartEmpty">
        <p>Your collection is empty.</p>
        <button class="link-btn" onclick="closeCart();navigateTo('gallery')">Browse Gallery →</button>
      </div>
    </div>
    <div class="cart-drawer-foot" id="cartFoot" style="display:none">
      <div class="cart-promo-row">
        <input type="text" id="promoInput" placeholder="Promo code" class="promo-field" aria-label="Promo code" />
        <button class="link-btn" onclick="applyPromo()">Apply</button>
      </div>
      <div id="promoMsg" class="promo-msg"></div>
      <div class="cart-totals">
        <div class="cart-total-row"><span>Subtotal</span><span id="cartSubtotal">₹0</span></div>
        <div class="cart-total-row discount-row" id="discountRow" style="display:none"><span>Discount</span><span id="discountAmt"></span></div>
        <div class="cart-total-row"><span>Shipping</span><span class="free-ship">Free worldwide</span></div>
        <div class="cart-total-row cart-grand-total"><span>Total</span><span id="cartTotal">₹0</span></div>
      </div>
      <button class="primary-btn full-btn" onclick="closeCart();navigateTo('checkout')">PROCEED TO CHECKOUT</button>
      <p class="cart-note">Certificate of Authenticity · Secure checkout</p>
    </div>
  </aside>

  <!-- NAV -->
  <header class="site-header" id="siteHeader">
    <nav class="nav-bar" role="navigation" aria-label="Main navigation">
      <button class="nav-logo" onclick="navigateTo('home')" aria-label="KalaKasturi Home">
        <img src="https://websitedemos.net/fashion-photography-04/wp-content/uploads/sites/1169/2023/02/Mason-Leblanc.svg" alt="Mason Leblanc Logo" style="height: 18px; filter: invert(1);" />
      </button>

      <ul class="nav-menu" role="list">
        <li><button id="nav-gallery"     class="nav-item" onclick="navigateTo('gallery')">Portfolio</button></li>
        <li><button id="nav-about"       class="nav-item" onclick="navigateTo('about')">Biography</button></li>
        <li><button id="nav-faq"         class="nav-item" onclick="navigateTo('faq')">Services</button></li>
        <li><button id="nav-contact"     class="nav-item" onclick="navigateTo('contact')">Contact</button></li>
      </ul>

      <div class="nav-actions">
        <button class="nav-icon-btn" onclick="navigateTo('account')" aria-label="Account" id="accountNavBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
        <button class="nav-icon-btn" onclick="navigateTo('wishlist')" aria-label="Wishlist">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
          <span class="nav-badge" id="wishBadge" style="display:none">0</span>
        </button>
        <button class="nav-icon-btn cart-icon-btn" onclick="toggleCart()" aria-label="Cart">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          <span class="nav-badge" id="cartBadge">0</span>
        </button>
        <button class="hamburger" id="hamburger" aria-label="Menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </nav>

    <!-- Mobile Menu -->
    <div class="mobile-nav" id="mobileNav">
      <button class="mobile-nav-item" onclick="navigateTo('gallery');closeMobileNav()">Portfolio</button>
      <button class="mobile-nav-item" onclick="navigateTo('about');closeMobileNav()">Biography</button>
      <button class="mobile-nav-item" onclick="navigateTo('faq');closeMobileNav()">Services</button>
      <button class="mobile-nav-item" onclick="navigateTo('contact');closeMobileNav()">Contact</button>
      <button class="mobile-nav-item" onclick="navigateTo('wishlist');closeMobileNav()">Wishlist</button>
      <button class="mobile-nav-item" onclick="navigateTo('account');closeMobileNav()">Account</button>
    </div>
  </header>

  <!-- APP -->
  <main id="app" role="main"></main>

  <script src="products.js"></script>
  <script src="app.js"></script>
</body>
</html>
